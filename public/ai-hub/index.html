<!doctype html>
<html lang="fr" class="dark">
  <!-- theme applied by React on mount; dark is the default -->

  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script type="module" crossorigin src="./assets/index-CMD5UYQv.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CwxGJxOc.css">
  </head>
  <body>
    <script>
      // Pre-set hash to /chat BEFORE React loads to avoid redirect race condition
      if (!location.hash || location.hash === '#' || location.hash === '#/') {
        history.replaceState(null, '', location.pathname + '#/chat');
      }
    </script>
    <div id="root">
      <!-- Inline loading état visible pendant que React charge -->
      <div id="app-loader" style="display:flex;align-items:center;justify-content:center;height:100dvh;background:#0a0a0f;flex-direction:column;gap:16px;">
        <div style="width:32px;height:32px;border-radius:50%;border:3px solid rgba(99,102,241,0.15);border-top-color:#6366f1;animation:spin .8s linear infinite;"></div>
        <p style="font-family:Inter,system-ui,sans-serif;font-size:14px;color:#9595a8;margin:0;">Initialisation de l'IA...</p>
      </div>
      <style>#app-loader{opacity:1;transition:opacity .3s}@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>
  </body>
</html>
